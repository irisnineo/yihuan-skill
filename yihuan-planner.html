<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>异环资源规划器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
  background: #f5f3ee; color: #1a1f1a; line-height: 1.6;
  padding: 16px;
}
.container { max-width: 520px; margin: 0 auto; }
h1 { font-size: 22px; color: #2f6f4f; margin-bottom: 16px; text-align: center; }
h2 { font-size: 16px; color: #2f6f4f; margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #d8e2d6; }
.card {
  background: #fff; border-radius: 14px; padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 12px;
}
.row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.row label { flex: 0 0 80px; font-size: 14px; color: #5d6b61; font-weight: 600; }
.row .wide { flex: 0 0 100%; margin-top: 4px; }
select, input[type="number"], input[type="text"] {
  flex: 1; min-width: 60px;
  padding: 8px 10px; border: 1px solid #d8e2d6; border-radius: 8px;
  font-size: 14px; background: #fafaf8; color: #1a1f1a;
}
select { cursor: pointer; }
input[type="checkbox"] { width: 18px; height: 18px; margin-right: 4px; cursor: pointer; }
.check-label { display: flex; align-items: center; cursor: pointer; font-size: 14px; color: #1a1f1a; }
.check-label input { margin-right: 6px; }
.cols2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.btn {
  display: block; width: 100%; padding: 12px; border: none; border-radius: 10px;
  background: #2f6f4f; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
  transition: background 0.15s;
}
.btn:hover { background: #3d8a63; }
.btn:active { background: #25563e; }
#result { display: none; }
.res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
.res-item {
  background: #f7fbf5; border-radius: 10px; padding: 12px; text-align: center;
}
.res-item .label { font-size: 11px; color: #5d6b61; font-weight: 700; }
.res-item .value { font-size: 20px; font-weight: 800; color: #2f6f4f; margin-top: 4px; }
.res-item .value.ok { color: #2f6f4f; }
.res-item .value.warn { color: #b98225; }
.res-item .value.danger { color: #a74935; }
table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #e8e8e0; }
th { background: #e6f2e5; color: #2f6f4f; font-weight: 700; }
td.num { text-align: right; }
.note { margin-top: 10px; padding: 10px 12px; border-left: 3px solid #2f6f4f; background: #f2f7ef; border-radius: 6px; font-size: 13px; color: #5d6b61; }
.alert { border-left-color: #a74935; background: #fff0eb; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; }
.tag.ok { background: #e6f2e5; color: #2f6f4f; }
.tag.warn { background: #fff3d6; color: #b98225; }
.tag.danger { background: #ffe0d6; color: #a74935; }
.footer { text-align: center; font-size: 12px; color: #9aa89e; margin-top: 20px; }
</style>
</head>
<body>
<div class="container">
  <h1>异环资源规划器</h1>

  <div class="card">
    <h2>① 基础信息</h2>
    <div class="row">
      <label>充值档位</label>
      <select id="tier">
        <option value="零氪">零氪</option>
        <option value="小月卡党">小月卡（30元）</option>
        <option value="大小月卡党" selected>小月卡 + 大月卡68元</option>
        <option value="大小月卡128">小月卡 + 大月卡128元</option>
      </select>
    </div>
  </div>

  <div class="card">
    <h2>② 当前库存</h2>
    <div class="cols2">
      <div class="row"><label>环石</label><input type="number" id="ring" value="0" min="0"></div>
      <div class="row"><label>限定骰子</label><input type="number" id="ltd" value="0" min="0"></div>
      <div class="row"><label>三重钥匙</label><input type="number" id="key" value="0" min="0"></div>
      <div class="row"><label>方斯</label><input type="number" id="fs" value="0" min="0" step="1000"></div>
    </div>
  </div>

  <div class="card">
    <h2>③ 抽取目标</h2>
    <div class="row">
      <label>角色名</label>
      <input type="text" id="charName" placeholder="如：伊洛伊" style="flex:2;">
    </div>
    <div class="row">
      <label>命座</label>
      <select id="cons" style="flex:0 0 80px;">
        <option value="0">0命</option><option value="1">1命</option><option value="2">2命</option>
        <option value="3">3命</option><option value="4">4命</option><option value="5">5命</option>
        <option value="6">6命</option>
      </select>
      <label style="flex:0 0 40px;">专武</label>
      <select id="wep" style="flex:0 0 80px;">
        <option value="0">不要</option><option value="1" selected>1把</option><option value="2">2把</option>
      </select>
    </div>
  </div>

  <div class="card">
    <h2>④ 额外消耗</h2>
    <div class="row">
      <label class="check-label"><input type="checkbox" id="chkAff"> 好感度</label>
      <span style="font-size:12px;color:#5d6b61;">（按nineo档案，每日64,500方斯）</span>
    </div>
    <div class="row">
      <label class="check-label"><input type="checkbox" id="chkExc" checked> 猎人交易所</label>
      <span style="font-size:12px;color:#5d6b61;">（278.2万方斯）</span>
    </div>
    <div class="row">
      <label class="check-label"><input type="checkbox" id="chkHouse"> 买房 / 载具</label>
      <input type="number" id="houseAmt" value="2000000" min="0" step="100000" disabled style="max-width:140px;">
    </div>
  </div>

  <button class="btn" onclick="calc()">开始计算</button>

  <div id="result" class="card">
    <h2>📊 计算结果</h2>
    <div id="resultContent"></div>
  </div>

  <div class="footer">数据版本 v1.2（九百九十九夜）· 生成日期 2026-07-09</div>
</div>

<script>
// ═══════════════════════════ 版本数据（内嵌）
const VERSION_DATA = {"banners":[{"type":"限定棋盘","content":"真红","end":"2026-07-23"},{"type":"限定棋盘","content":"伊洛伊","end":"2026-08-13"},{"type":"弧盘研摹","content":"穿过胭红孢雾","end":"2026-07-23"},{"type":"弧盘研摹","content":"错误的门","end":"2026-08-13"}],"affection_daily":64500,"exchange_cost":2782000,"tiers":{"零氪":{"remaining":{"环石":6060,"方斯":7432000,"限定骰子":5,"常驻骰子":5,"三重钥匙":20},"total":{"环石":11110,"方斯":10978000,"三重钥匙":60,"永恒的螺音":5,"限定骰子":15,"常驻骰子":10,"常驻 S 角色自选":1},"remaining_days":34},"小月卡党":{"remaining":{"环石":9120,"方斯":8452000,"限定骰子":5,"常驻骰子":5,"三重钥匙":20},"total":{"环石":15190,"方斯":12238000,"三重钥匙":60,"永恒的螺音":5,"限定骰子":15,"常驻骰子":10,"常驻 S 角色自选":1},"remaining_days":34},"大小月卡党":{"remaining":{"环石":9800,"方斯":9152000,"限定骰子":9,"常驻骰子":7,"三重钥匙":20},"total":{"环石":15870,"方斯":12938000,"限定骰子":19,"常驻骰子":12,"三重钥匙":60,"永恒的螺音":5,"常驻 S 角色自选":1},"remaining_days":34}}};

// 大月卡128比68多的额外资源
const EXTRA_128 = { '常驻骰子': 5, '方斯': 500000 };
const EXPECTED = { '限定棋盘': 45, '弧盘研摹': 60 };
const SAFE = 7200;

function num(id) { return parseInt(document.getElementById(id).value) || 0; }

function findBanner(name, type) {
  return VERSION_DATA.banners.find(b => b.type === type && b.content === name);
}

function fmt(n) {
  if (n >= 10000000) return (n/10000000).toFixed(1) + '千万';
  if (n >= 10000) return (n/10000).toFixed(1) + '万';
  return n.toLocaleString();
}

function calc() {
  const tier = document.getElementById('tier').value;
  const is128 = tier === '大小月卡128';
  const realTier = is128 ? '大小月卡党' : tier;
  const td = VERSION_DATA.tiers[realTier];
  const rem = td.remaining;
  const days = td.remaining_days;

  // 库存
  let inv = {
    '环石': num('ring'), '限定骰子': num('ltd'), '三重钥匙': num('key'), '方斯': num('fs')
  };

  // 128额外
  if (is128) {
    inv['常驻骰子'] = (inv['常驻骰子']||0) + EXTRA_128['常驻骰子'];
    inv['方斯'] += EXTRA_128['方斯'];
  }

  // 可用 = 库存 + 未开放
  let avail = {};
  for (let k of ['环石','限定骰子','三重钥匙','常驻骰子','方斯']) {
    avail[k] = (inv[k]||0) + (rem[k]||0);
  }

  // 目标
  const cname = document.getElementById('charName').value.trim();
  const cons = parseInt(document.getElementById('cons').value);
  const wep = parseInt(document.getElementById('wep').value);
  const charCount = cons + 1;
  const charNeed = charCount * EXPECTED['限定棋盘'];
  const wepNeed = wep * EXPECTED['弧盘研摹'];

  let charGap = 0, wepGap = 0, stoneNeeded = 0, stoneAfter = avail['环石'];
  let charBannerEnd = null, wepBannerEnd = null;

  if (cname) {
    const cb = findBanner(cname, '限定棋盘');
    if (cb) charBannerEnd = cb.end;
    const wb = findBanner(cname.replace(/[^马a-zA-Z0-9\u4e00-\u9fff]/g,''), '弧盘研摹');
    // 找同期武器
    let wbFound = null;
    if (cb) {
      wbFound = VERSION_DATA.banners.find(b => b.type === '弧盘研摹' && b.start === cb.start);
    }
    // 其实 banners 没有 start 字段…用 content 近似匹配
    if (!wbFound && cb) {
      // 伊洛伊 -> 错误的门, 真红 -> 穿过胭红孢雾
      const wepMap = { '真红': '穿过胭红孢雾', '伊洛伊': '错误的门' };
      const wn = wepMap[cname];
      if (wn) wbFound = findBanner(wn, '弧盘研摹');
    }
    if (wbFound) wepBannerEnd = wbFound.end;

    charGap = Math.max(0, charNeed - avail['限定骰子']);
    wepGap = Math.max(0, wepNeed - avail['三重钥匙']);
    stoneNeeded = charGap * 160 + wepGap * 160;
    stoneAfter = avail['环石'] - stoneNeeded;
  }

  // 额外消耗
  let extraFS = 0;
  if (document.getElementById('chkAff').checked) {
    extraFS += VERSION_DATA.affection_daily * days;
  }
  if (document.getElementById('chkExc').checked) {
    extraFS += VERSION_DATA.exchange_cost;
  }
  if (document.getElementById('chkHouse').checked) {
    extraFS += num('houseAmt');
  }

  const fsAfter = avail['方斯'] - extraFS;
  const safeOk = stoneAfter >= SAFE;

  // ── 渲染结果 ──
  let html = '';

  // 结论卡片
  html += `<div class="res-grid">
    <div class="res-item"><div class="label">版本末环石</div>
      <div class="value ${stoneAfter>=0?'ok':'danger'}">${fmt(Math.max(0,stoneAfter))}</div></div>
    <div class="res-item"><div class="label">版本末方斯</div>
      <div class="value ${fsAfter>=0?'ok':'danger'}">${fmt(Math.max(0,fsAfter))}</div></div>
    <div class="res-item"><div class="label">限定骰子余量</div>
      <div class="value">${avail['限定骰子']}</div></div>
    <div class="res-item"><div class="label">三重钥匙余量</div>
      <div class="value">${avail['三重钥匙']}</div></div>
  </div>`;

  // 安全垫
  html += `<div style="margin-top:10px;text-align:center;">
    <span class="tag ${safeOk?'ok':'danger'}">安全垫 ${safeOk?'✅ 充足':'❌ 不足'}（需≥${fmt(SAFE)}环石）</span>
  </div>`;

  // 资源表
  html += `<table style="margin-top:14px;"><thead><tr>
    <th>资源</th><th class="num">库存</th><th class="num">未开放</th><th class="num">可动用</th>
  </tr></thead><tbody>`;
  for (let r of ['环石','限定骰子','三重钥匙','常驻骰子','方斯']) {
    if (r === '方斯') {
      html += `<tr><td>${r}</td>
        <td class="num">${fmt(inv[r]||0)}</td>
        <td class="num">${fmt(rem[r]||0)}</td>
        <td class="num"><b>${fmt(avail[r])}</b></td></tr>`;
    } else {
      html += `<tr><td>${r}</td>
        <td class="num">${(inv[r]||0).toLocaleString()}</td>
        <td class="num">${(rem[r]||0).toLocaleString()}</td>
        <td class="num"><b>${avail[r].toLocaleString()}</b></td></tr>`;
    }
  }
  html += `</tbody></table>`;

  // 目标消耗
  if (cname) {
    html += `<h2 style="margin-top:16px;">🎯 目标：${cname} ${cons}+${wep}</h2>`;
    html += `<table><thead><tr><th>项目</th><th class="num">消耗</th><th>备注</th></tr></thead><tbody>`;
    html += `<tr><td>角色 ${cname}</td>
      <td class="num">${charGap>0?avail['限定骰子']+' 限定骰子 + '+fmt(charGap*160)+' 环石':avail['限定骰子']+' 限定骰子'}</td>
      <td>期望 ${charNeed} 抽${charGap>0?'，缺口 '+charGap+' 抽':''}${charBannerEnd?' 卡池至 '+charBannerEnd:''}</td></tr>`;
    if (wepNeed > 0) {
      html += `<tr><td>武器 ${cname}专武</td>
        <td class="num">${wepGap>0?avail['三重钥匙']+' 三重钥匙 + '+fmt(wepGap*160)+' 环石':avail['三重钥匙']+' 三重钥匙'}</td>
        <td>期望 ${wepNeed} 抽${wepGap>0?'，缺口 '+wepGap+' 抽':''}${wepBannerEnd?' 卡池至 '+wepBannerEnd:''}</td></tr>`;
    }
    html += `<tr><td><b>环石合计</b></td>
      <td class="num"><b>${fmt(stoneNeeded)}</b></td>
      <td>${safeOk?'✅ 安全垫充足':(stoneAfter>=0?'⚠️ 结余为正但低于安全垫':'❌ 不足')}</td></tr>`;
    html += `</tbody></table>`;
  }

  // 额外消耗
  if (extraFS > 0) {
    html += `<div class="note">`;
    html += `<b>额外方斯消耗：${fmt(extraFS)}</b><br>`;
    if (document.getElementById('chkAff').checked)
      html += `· 好感度：${fmt(VERSION_DATA.affection_daily)}/天 × ${days} 天 = ${fmt(VERSION_DATA.affection_daily*days)}<br>`;
    if (document.getElementById('chkExc').checked)
      html += `· 交易所：${fmt(VERSION_DATA.exchange_cost)}<br>`;
    if (document.getElementById('chkHouse').checked)
      html += `· 买房/载具：${fmt(num('houseAmt'))}<br>`;
    html += `</div>`;
  }

  // 方斯警告
  if (fsAfter < 0) {
    html += `<div class="note alert">⚠️ 方斯缺口 ${fmt(Math.abs(fsAfter))}，建议减少消耗或增加礼包。</div>`;
  } else if (fsAfter < 1000000) {
    html += `<div class="note alert">⚠️ 版本末方斯仅 ${fmt(fsAfter)}，偏紧。</div>`;
  }

  document.getElementById('resultContent').innerHTML = html;
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}

// 买房复选框联动
document.getElementById('chkHouse').addEventListener('change', function() {
  document.getElementById('houseAmt').disabled = !this.checked;
});
</script>
</body>
</html>
